<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💘 Will you be my Valentine?</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fun font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet" />

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family:
                "Fredoka",
                system-ui,
                -apple-system,
                Segoe UI,
                Roboto,
                Arial,
                sans-serif;
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(-1deg) scale(1);
            }

            50% {
                transform: rotate(1deg) scale(1.02);
            }
        }

        .wiggle {
            animation: wiggle 2.2s ease-in-out infinite;
        }

        @keyframes pop {
            0% {
                transform: scale(0.98);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .pop {
            animation: pop 220ms ease-out;
        }

        /* @keyframes tinybounce {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-20px);
        }
      }

      .yay:hover {
        animation: tinybounce 400ms ease-in-out;
      } */

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 260ms ease-in-out;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-rose-50 via-pink-50 to-amber-50">
    <audio id="noSound" src="no.mp3" preload="auto"></audio>
    <audio id="rewardSound" src="reward.mp3" preload="auto"></audio>
    <audio id="yesSound" src="victory.mp3" preload="auto"></audio>

    <main class="mx-auto flex min-h-screen max-w-3xl items-center justify-center p-6">
        <div id="card"
            class="w-full rounded-3xl border border-white/60 bg-white/70 p-6 shadow-xl backdrop-blur md:p-10">
            <!-- Top -->
            <div class="flex flex-col items-center text-center">
                <!-- Replace src with your caricature file name if you add one (see Step 4) -->
                <img id="heroImg" src="./val.png" alt="Valentine"
                    class="wiggle mb-5 h-44 w-44 rounded-3xl object-cover ring-white/70 md:h-52 md:w-52" />

                <h1 class="text-4xl font-semibold tracking-tight text-rose-700 md:text-5xl">
                    Will you be my Valentine ritVik?
                </h1>

                <p id="tip" class="mt-8 text-center text-sm text-slate-500">
                    Tip: there is only one correct answer.
                </p>

                <p id="subtext" class="mt-3 max-w-xl text-lg text-slate-700 md:text-xl">
                    Choose wisely. I am emotionally stable (mostly).
                </p>
            </div>

            <!-- Buttons -->
            <div class="mt-8 flex flex-col items-center justify-center gap-4 sm:flex-row">
                <button id="yesBtn"
                    class="pop transition-transform inline-flex items-center justify-center rounded-2xl bg-rose-600 px-8 py-4 text-lg font-semibold text-white shadow-lg shadow-rose-200 transition hover:-translate-y-0.5 hover:bg-rose-700 active:translate-y-0">
                    YES &nbsp; :)
                </button>

                <button id="noBtn"
                    class="pop inline-flex items-center justify-center rounded-2xl bg-slate-900 px-8 py-4 text-lg font-semibold text-white shadow-lg shadow-slate-200 transition hover:-translate-y-0.5 hover:bg-slate-800 active:translate-y-0">
                    no &nbsp; -_-
                </button>
            </div>
            <div class="mt-6">
                <div class="h-2 w-full rounded-full bg-rose-100">
                    <div id="meter" class="h-2 rounded-full bg-rose-400" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const card = document.getElementById("card");
        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");
        const subtext = document.getElementById("subtext");
        const tip = document.getElementById("tip");
        const meter = document.getElementById("meter");
        const noSound = document.getElementById("noSound");
        const yesSound = document.getElementById("yesSound");
        const rewardSound = document.getElementById("rewardSound");

        // progressively chaotic "No" flow
        const noStages = [
            { btn: "no 😐", msg: "" },
            {
                btn: "are you sure?",
                msg: "I will pretend I didn’t see that click.",
            },
            { btn: "REALLY sure??", msg: "Interesting choice. Bold." },
            {
                btn: "final answer?",
                msg: "Okay now you’re just clicking buttons for fun.",
            },
            {
                btn: "this one?",
                msg: "I’m starting to question your judgment, sir.",
            },
            {
                btn: "pls?? 🥺",
                msg: "This is a one-question quiz with one right answer.",
            },
            { btn: "YES (obviously)", msg: "No button has been converted to YES for safety." },
        ];

        let noCount = 0;

        function shakeCard() {
            card.classList.remove("shake");
            void card.offsetWidth; // restart animation
            card.classList.add("shake");
        }

        function fireConfetti() {
            const duration = 1200;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    spread: 70,
                    origin: { x: Math.random(), y: 0.7 },
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            })();

            confetti({
                particleCount: 120,
                spread: 90,
                startVelocity: 45,
                origin: { y: 0.6 },
            });
        }

        function showYesScreen() {
            yesStage = 1;
            document.body.style.background = `linear-gradient(to bottom right, #ffe4e6, #fecdd3, #fbcfe8)`;
            fireConfetti();
            document.querySelector("h1").textContent = "YAY. Good choice 😌";
            subtext.textContent =
                "I was going to be your Valentine anyway. Congrats.";
            noBtn.classList.add("hidden");
            tip.classList.add("hidden");
            meter.style.width = "100%";
            yesBtn.textContent = "CLAIM YOUR REWARD 🎁";
            yesSound.currentTime = 0;
            yesSound.play().catch(() => { });
        }

        let noConverted = false;

        noBtn.addEventListener("click", () => {
            if (noConverted) {
                showYesScreen();
                return;
            }

            noSound.currentTime = 0;
            noSound.play().catch(() => { });

            noCount = Math.min(noCount + 1, noStages.length - 1);
            const stage = noStages[noCount];

            noBtn.textContent = stage.btn;
            subtext.textContent = stage.msg;

            tip.textContent = `Wrong attempts: ${noCount} / ${noStages.length - 1}`;

            // Make "No" button gradually shrink (chaos)
            const scale = Math.max(0.72, 1 - noCount * 0.06);
            noBtn.style.transform = `scale(${scale})`;

            const pct = Math.round((noCount / (noStages.length - 1)) * 100);
            meter.style.width = `${pct}%`;

            yesBtn.style.transform = `scale(${1 + noCount * 0.05})`;

            shakeCard();

            // At final no, force YES
            if (noCount === noStages.length - 1) {
                tip.textContent = "Fixing your answer for correctness…";
                noBtn.classList.add("bg-rose-600", "hover:bg-rose-700");
                noBtn.classList.remove("bg-slate-900", "hover:bg-slate-800");
                noConverted = true;
            }
        });

        let yesStage = 0;

        yesBtn.addEventListener("click", () => {
            if (yesStage === 0) {
                showYesScreen();
                return;
            }

            if (yesStage === 1) {
                rewardSound.currentTime = 0;
                rewardSound.play().catch(() => { });

                yesBtn.textContent = "We are finishing Naruto! 🍜";
                fireConfetti();

                // Make it not look like a button anymore
                yesBtn.classList.remove(
                    "bg-rose-600",
                    "hover:bg-rose-700",
                    "shadow-lg",
                    "shadow-rose-200",
                    "hover:-translate-y-0.5",
                    "text-white"
                );
                yesBtn.classList.add(
                    "bg-transparent",
                    "text-rose-700",
                    "shadow-none",
                    "text-xl",
                    "cursor-default",
                    "font-bold"
                );
                yesBtn.disabled = true;

                yesStage = 2;
            }
        });
    </script>
</body>

</html>
